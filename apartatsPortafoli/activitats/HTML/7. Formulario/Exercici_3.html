<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro en Red Social</title>
</head>
<body>

<form action="#" method="post">
    <fieldset>
        <legend>Crear cuenta</legend>

        <label for="nombre">Nombre completo:</label>
        <input type="text" id="nombre" name="nombre" required>
        <br><br>

        <label for="usuario">Nombre de usuario:</label>
        <input type="text" id="usuario" name="usuario" required>
        <br><br>

        <label for="email">Correo electrónico:</label>
        <input type="email" id="email" name="email" required>
        <br><br>

        <label for="password">Contraseña:</label>
        <input type="password" id="password" name="password" 
               pattern=".{8,}" title="Mínimo 8 caracteres" required>
        <br><br>


        <label for="confirmar">Confirmar contraseña:</label>
        <input type="password" id="confirmar" name="confirmar" required>
        <br><br>

        <label for="fecha">Fecha de nacimiento:</label>
        <input type="date" id="fecha" name="fecha" required>
        <br><br>

        <label>Género:</label><br>
        <input type="radio" name="genero" value="hombre"> Hombre
        <input type="radio" name="genero" value="mujer"> Mujer
        <input type="radio" name="genero" value="otro"> Otro
        <br><br>

        <label for="intereses">Intereses:</label><br>
        <input type="checkbox" name="intereses" value="deporte"> Deporte
        <input type="checkbox" name="intereses" value="musica"> Música
        <input type="checkbox" name="intereses" value="viajes"> Viajes
        <br><br>

        <label for="foto">Foto de perfil:</label>
        <input type="file" id="foto" name="foto">
        <br><br>

        <input type="checkbox" id="terminos" name="terminos" required>
        <label for="terminos">Acepto los términos y condiciones</label>
        <br><br>

        <button type="submit">Registrarse</button>

    </fieldset>
</form>
<br>
<a href="/activitats_html.html">Anar a les activitats</a>
</body>
</html>
