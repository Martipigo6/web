<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Document</title>
</head>
<body>

<form action="#" method="post">
    <fieldset>
        <legend>Venta de altavoces</legend>


        <label for="modelo">Modelo:</label>
        <select name="modelo" id="modelo" required>
            <option value="" disabled selected>Elige un modelo</option>
            <option value="R4">R4</option>
            <option value="R5">R5</option>
            <option value="SR1">SR1</option>
        </select>
        <br><br>

        <label for="potencia">Potencia máxima:</label>
        <input type="number" id="potencia" name="potencia" min="50" max="100" required>
        <br><br>


        <label>¿Bluetooth?</label><br>
        <input type="radio" id="si" name="bluetooth" value="si" required>
        <label for="si">Sí</label>

        <input type="radio" id="no" name="bluetooth" value="no">
        <label for="no">No</label>
        <br><br>


        <label for="color">Color:</label>
        <input type="color" id="color" name="color">
        <br><br>

    
        <button type="submit">Enviar</button>

    </fieldset>
</form>
<br>
<a href="/activitats.html">Ir a las actividades</a>

</body>
</html>
